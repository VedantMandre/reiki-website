# Cloudflare Pages configuration.
name = "suved-healing"
pages_build_output_dir = "."
compatibility_date = "2026-07-01"

# ── Reviews database ──────────────────────────────────────────────
# The D1 binding stays commented out until the database exists:
# deploying a binding whose database_id doesn't exist fails the whole
# deploy. After running `npx wrangler d1 create suved-reviews`
# (OWNER-RUNBOOK.md step 10), uncomment the three lines below and
# replace the id with the one wrangler prints. Until then the site
# deploys fine and the review form degrades gracefully.
#
# [[d1_databases]]
# binding = "DB"
# database_name = "suved-reviews"
# database_id = "PASTE-THE-UUID-FROM-WRANGLER-D1-CREATE"
