name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: "cloudflare-pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
      # wrangler runs on the runner's Node directly — no third-party JS
      # action runtime to go stale/deprecated
      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler@4 pages deploy . --project-name=suved-healing --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: a238f0124b7c58a63a6c1dd65d83f178
